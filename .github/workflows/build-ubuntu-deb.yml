name: Build Ubuntu Deb

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-ubuntu-deb.yml"
      - "build/**"
      - "electron-builder.yml"
      - "electron.vite.config.ts"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "tsconfig*.json"
      - "resources/**"

permissions:
  contents: read

concurrency:
  group: build-ubuntu-deb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Ubuntu .deb
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native dependencies
        run: npx electron-builder install-app-deps --arch=x64

      - name: Build app
        env:
          VITE_ANALYTICS_BASE_URL: ${{ vars.VITE_ANALYTICS_BASE_URL }}
          VITE_ANALYTICS_API_KEY: ${{ secrets.VITE_ANALYTICS_API_KEY }}
        run: npm run build

      - name: Package Ubuntu deb
        run: npx electron-builder --linux deb --x64 --publish never

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-deb-x64
          path: |
            dist/*.deb
          if-no-files-found: error
